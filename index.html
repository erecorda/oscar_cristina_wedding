<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cris & Oscar · Versions web</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>

:root{
--bg:#f6f2ec;
--paper:#ffffff;
--text:#2c2a28;
--muted:#6e675f;
--accent:#b89563;
--radius:24px;
--shadow:0 20px 50px rgba(0,0,0,.12);
--max:900px;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter,sans-serif;
background:var(--bg);
color:var(--text);
display:flex;
align-items:center;
min-height:100vh;
}

h1{
font-family:"Playfair Display",serif;
font-size:clamp(2.8rem,6vw,4.5rem);
margin-bottom:16px;
}

.container{
width:min(calc(100% - 40px),var(--max));
margin:auto;
text-align:center;
}

.card{
background:var(--paper);
border-radius:var(--radius);
box-shadow:var(--shadow);
padding:50px 40px;
}

p{
color:var(--muted);
font-size:1rem;
margin-bottom:40px;
}

.buttons{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.btn{
display:flex;
align-items:center;
justify-content:center;
height:70px;
border-radius:16px;
background:var(--accent);
color:white;
font-weight:600;
text-decoration:none;
font-size:1.1rem;
transition:.2s;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(0,0,0,.15);
}

@media(max-width:700px){

.buttons{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>Cris & Oscar</h1>

<p>
Revisa les tres opcions de disseny de la web i digue'm quina t’agrada més i quina opinió tens.
</p>

<div class="buttons">

<a class="btn" href="v1.html">Versió 1</a>

<a class="btn" href="v2.html">Versió 2</a>

<a class="btn" href="v3.html">Versió 3</a>

</div>

</div>

</div>

</body>
</html>
